version: "3.9"

services:
  postgres:
    image: postgres:16-alpine
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: sherlock
      POSTGRES_PASSWORD: sherlock
      POSTGRES_DB: sherlock
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U sherlock"]
      interval: 5s
      timeout: 5s
      retries: 5

  minio:
    image: minio/minio:latest
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    command: server /data --console-address ":9001"
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 5s
      timeout: 5s
      retries: 5

  minio-init:
    image: minio/mc:latest
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
      mc alias set local http://minio:9000 minioadmin minioadmin &&
      mc mb --ignore-existing local/sherlock
      "

  nats:
    image: nats:2-alpine
    ports:
      - "4222:4222"
    command: -js
    healthcheck:
      test: ["CMD", "nats-server", "--signal", "ldm"]
      interval: 5s
      timeout: 5s
      retries: 5

  sherlock:
    build:
      context: ../../
      dockerfile: Dockerfile
    ports:
      - "8080:8080"
    depends_on:
      postgres:
        condition: service_healthy
      minio-init:
        condition: service_completed_successfully
      nats:
        condition: service_healthy
    env_file:
      - ../.env
    environment:
      SHERLOCK_POSTGRES_DSN: "postgres://sherlock:sherlock@postgres:5432/sherlock?sslmode=disable"
      SHERLOCK_NATS_URL: "nats://nats:4222"
      SHERLOCK_S3_ENDPOINT: "http://minio:9000"

volumes:
  pgdata:
