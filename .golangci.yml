run:
  timeout: 5m
  modules-download-mode: readonly

linters:
  enable:
    - errcheck
    - govet
    - ineffassign
    - staticcheck
    - unused
    - gosimple
    - gocritic
    - gofmt
    - goimports
    - misspell
    - unconvert
    - unparam
    - bodyclose
    - noctx
    - prealloc
    - revive
    - errname
    - errorlint
    - exhaustive
    - nilerr
    - whitespace

linters-settings:
  gocritic:
    enabled-checks:
      - dupImport
      - nestingReduce
      - unnamedResult
  revive:
    rules:
      - name: blank-imports
      - name: exported
        arguments:
          - "disableStutteringCheck"
      - name: unused-parameter
      - name: unreachable-code
      - name: redefines-builtin-id
  exhaustive:
    default-signifies-exhaustive: true
  errcheck:
    check-type-assertions: true
  govet:
    enable-all: true
    disable:
      - fieldalignment

issues:
  exclude-rules:
    - path: _test\.go
      linters:
        - errcheck
        - gocritic
        - unparam
    - linters:
        - gocritic
      text: "unnecessaryDefer"
  max-issues-per-linter: 0
  max-same-issues: 0
