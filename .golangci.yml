version: "2"
run:
  modules-download-mode: readonly
linters:
  enable:
    - bodyclose
    - errname
    - errorlint
    - exhaustive
    - gocritic
    - misspell
    - nilerr
    - noctx
    - prealloc
    - revive
    - unconvert
    - unparam
    - whitespace
  settings:
    errcheck:
      check-type-assertions: true
    exhaustive:
      default-signifies-exhaustive: true
    gocritic:
      enabled-checks:
        - dupImport
        - nestingReduce
    govet:
      disable:
        - fieldalignment
        - shadow
      enable-all: true
    revive:
      rules:
        - name: blank-imports
        - name: exported
          arguments:
            - disableStutteringCheck
        - name: unused-parameter
        - name: unreachable-code
        - name: redefines-builtin-id
  exclusions:
    generated: lax
    presets:
      - comments
      - common-false-positives
      - legacy
      - std-error-handling
    rules:
      - linters:
          - errcheck
          - gocritic
          - noctx
          - revive
          - unparam
          - unused
        path: _test\.go
      - linters:
          - gocritic
        text: unnecessaryDefer
    paths:
      - third_party$
      - builtin$
      - examples$
issues:
  max-issues-per-linter: 0
  max-same-issues: 0
formatters:
  enable:
    - gofmt
    - goimports
  exclusions:
    generated: lax
    paths:
      - third_party$
      - builtin$
      - examples$
